name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PAT to ensure the push triggers follow-up actions if needed
          token: ${{ secrets.DIST_REPO_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Versioning (Changesets)
        id: changesets
        uses: changesets/action@v1
        with:
          # We only want to tag, not publish to NPM
          publish: pnpm run release:tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Distribution Repositories
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          DIST_REPO_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
        run: |
          # 1. Manually ensure tags are pushed to monorepo
          git push origin --tags

          # 2. Iterate through all packages in your specific structure
          for PKG_JSON in packages/flixlix-cards/*/package.json; do
            PKG_DIR=$(dirname "$PKG_JSON")
            NAME=$(jq -r '.name' "$PKG_JSON")
            VERSION=$(jq -r '.version' "$PKG_JSON")
            CLEAN_NAME=$(echo $NAME | sed 's|^@.*/||')

            echo "🔍 Checking $CLEAN_NAME (v$VERSION)..."

            # 3. Check if this version already exists as a tag in the destination repo
            # This is the most reliable "Is there a new version?" check
            TAG_EXISTS=$(git ls-remote --tags "https://github.com/flixlix/${CLEAN_NAME}.git" "refs/tags/v${VERSION}")

            if [ -n "$TAG_EXISTS" ]; then
              echo "✅ $CLEAN_NAME is already up to date at v$VERSION. Skipping."
              continue
            fi

            echo "🛠 New version detected! Syncing $CLEAN_NAME v$VERSION..."

            # 4. Build
            pnpm --filter "$NAME" build

            # 5. Sync to Distribution Repo
            rm -rf dist-repo
            git clone "https://x-access-token:${DIST_REPO_TOKEN}@github.com/flixlix/${CLEAN_NAME}.git" dist-repo
            
            cp -f "${PKG_DIR}/dist/${CLEAN_NAME}.js" dist-repo/
            cp -f "${PKG_DIR}/hacs.json" dist-repo/
            cp -f "${PKG_DIR}/README.md" dist-repo/
            cp -f "${PKG_DIR}/CHANGELOG.md" dist-repo/ || true

            cd dist-repo
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            
            # Commit and Tag
            if ! git diff-index --quiet HEAD; then
              git commit -m "Release v${VERSION}"
              git tag -a "v${VERSION}" -m "Release v${VERSION}"
              git push origin main --tags --force
              
              # Create Release
              gh release create "v${VERSION}" "${CLEAN_NAME}.js" \
                --repo "flixlix/${CLEAN_NAME}" \
                --title "v${VERSION}" \
                --notes "Automated release from monorepo. See [flixlix-cards](https://github.com/flixlix/flixlix-cards) for source."
              echo "🚀 Successfully synced $CLEAN_NAME v$VERSION"
            fi
            
            cd ../..
            rm -rf dist-repo
          done