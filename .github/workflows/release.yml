name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DIST_REPO_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Versioning (Changesets)
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run release:tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync & Create Releases
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          DIST_REPO_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
        run: |
          # 1. Ensure Monorepo tags are pushed
          git push origin --tags

          # 2. Iterate through packages
          for PKG_JSON in packages/flixlix-cards/*/package.json; do
            PKG_DIR=$(dirname "$PKG_JSON")
            NAME=$(jq -r '.name' "$PKG_JSON")
            VERSION=$(jq -r '.version' "$PKG_JSON")
            CLEAN_NAME=$(echo $NAME | sed 's|^@.*/||')
            MONO_TAG="${NAME}@${VERSION}"

            echo "🔍 Processing $CLEAN_NAME (v$VERSION)..."

            # 3. Check if we need to release (Is the tag for this version in the Dist repo?)
            TAG_EXISTS=$(git ls-remote --tags "https://github.com/flixlix/${CLEAN_NAME}.git" "refs/tags/v${VERSION}")
            if [ -n "$TAG_EXISTS" ]; then
              echo "✅ $CLEAN_NAME is up to date."
              continue
            fi

            # 4. Extract specific release notes from CHANGELOG.md
            # This logic grabs everything between the current version header and the next header
            CHANGELOG_PATH="${PKG_DIR}/CHANGELOG.md"
            NOTES="New release."
            if [ -f "$CHANGELOG_PATH" ]; then
              # Get content from the first ## [version] down to the next ##
              NOTES=$(sed -n "/## ${VERSION}/,/## /p" "$CHANGELOG_PATH" | sed '$d')
              # If extraction fails or is too short, fallback to title
              if [ ${#NOTES} -lt 10 ]; then NOTES="Release v${VERSION}"; fi
            fi

            # 5. Build
            pnpm --filter "$NAME" build

            # 6. Create Monorepo Release
            # This makes the monorepo look professional
            gh release create "$MONO_TAG" \
              --title "$MONO_TAG" \
              --notes "$NOTES" || true

            # 7. Sync to Distribution Repo
            echo "📦 Syncing to flixlix/${CLEAN_NAME}..."
            rm -rf dist-repo
            git clone "https://x-access-token:${DIST_REPO_TOKEN}@github.com/flixlix/${CLEAN_NAME}.git" dist-repo
            
            cp -f "${PKG_DIR}/dist/${CLEAN_NAME}.js" dist-repo/
            cp -f "${PKG_DIR}/hacs.json" dist-repo/
            cp -f "${PKG_DIR}/README.md" dist-repo/
            cp -f "${PKG_DIR}/CHANGELOG.md" dist-repo/ || true

            cd dist-repo
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            
            if ! git diff-index --quiet HEAD; then
              git commit -m "Release v${VERSION}"
              git tag -a "v${VERSION}" -m "Release v${VERSION}"
              git push origin main --tags --force
              
              # 8. Create Dist Repo Release with Notes & Asset
              gh release create "v${VERSION}" "${CLEAN_NAME}.js" \
                --repo "flixlix/${CLEAN_NAME}" \
                --title "v${VERSION}" \
                --notes "$NOTES"
              echo "🚀 Successfully synced $CLEAN_NAME v$VERSION"
            fi
            
            cd ../..
            rm -rf dist-repo
          done