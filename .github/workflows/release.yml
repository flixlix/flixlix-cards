name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DIST_REPO_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Versioning (Changesets)
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run release:tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync & Create Releases
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          DIST_REPO_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
        run: |
          # Loop through all card packages
          for PKG_JSON in packages/flixlix-cards/*/package.json; do
            PKG_DIR=$(dirname "$PKG_JSON")
            NAME=$(jq -r '.name' "$PKG_JSON")
            VERSION=$(jq -r '.version' "$PKG_JSON")
            CLEAN_NAME=$(echo $NAME | sed 's|^@.*/||')

            # CHECK IF VERSION CHANGED IN THIS COMMIT
            # This compares the version in this commit to the version in the previous commit
            OLD_VERSION=$(git show HEAD~1:"$PKG_JSON" | jq -r '.version' || echo "0.0.0")

            if [ "$VERSION" != "$OLD_VERSION" ]; then
              echo "✨ Version change detected for $NAME: $OLD_VERSION -> $VERSION"
              
              # 1. Extract Changelog Notes
              CHANGELOG_PATH="${PKG_DIR}/CHANGELOG.md"
              NOTES="Release v${VERSION}"
              if [ -f "$CHANGELOG_PATH" ]; then
                # Get notes between the new version and the one before it
                NOTES=$(sed -n "/## ${VERSION}/,/## /p" "$CHANGELOG_PATH" | sed '$d')
                if [ ${#NOTES} -lt 10 ]; then NOTES="Release v${VERSION}"; fi
              fi

              # 2. Prerelease detection
              PRERELEASE_FLAG=""
              if [[ "$VERSION" == *"-"* ]]; then
                PRERELEASE_FLAG="--prerelease"
              fi

              # 3. Build and Sync to Storefront
              echo "📦 Syncing Card: $CLEAN_NAME to distribution repo..."
              pnpm --filter "$NAME" build
              
              rm -rf dist-repo
              git clone "https://x-access-token:${DIST_REPO_TOKEN}@github.com/flixlix/${CLEAN_NAME}.git" dist-repo
              
              cp -f "${PKG_DIR}/dist/${CLEAN_NAME}.js" dist-repo/
              cp -f "${PKG_DIR}/hacs.json" dist-repo/
              cp -f "${PKG_DIR}/README.md" dist-repo/
              cp -f "${PKG_DIR}/CHANGELOG.md" dist-repo/ || true

              cd dist-repo
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add .
              
              if ! git diff-index --quiet HEAD; then
                git commit -m "Release v${VERSION}"
                git tag -a "v${VERSION}" -m "Release v${VERSION}"
                git push origin main --tags --force
                gh release create "v${VERSION}" "${CLEAN_NAME}.js" --repo "flixlix/${CLEAN_NAME}" --title "v${VERSION}" --notes "$NOTES" $PRERELEASE_FLAG
              fi
              cd ..
              rm -rf dist-repo
            else
              echo "✅ No version change for $NAME ($VERSION)"
            fi
          done