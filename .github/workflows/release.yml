name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # ============================================
      # SETUP
      # ============================================
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DIST_REPO_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      # ============================================
      # CHANGESETS (Version PR or Tag)
      # ============================================
      - name: Run Changesets
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run release:tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================
      # DETECT RELEASED PACKAGES
      # ============================================
      - name: Detect packages to release
        id: released-packages
        shell: bash
        run: |
          set -euo pipefail

          # Helper to check if package should be published
          is_publishable() {
            local name="$1"
            # Skip internal/tooling packages
            [[ "$name" == @flixlix-cards/* ]] && return 1
            return 0
          }

          echo "::group::Debug Information"
          echo "github.event.before: ${{ github.event.before }}"
          echo "github.sha: ${{ github.sha }}"
          echo "changesets published output: '${{ steps.changesets.outputs.publishedPackages }}'"
          echo "Current branch: $(git branch --show-current)"
          echo "::endgroup::"

          # Method 1: Check changesets output (filter internal packages)
          published='${{ steps.changesets.outputs.publishedPackages }}'
          if [ -n "$published" ] && [ "$published" != "[]" ]; then
            filtered=$(echo "$published" | jq -c '[.[] | select(.name | startswith("@flixlix-cards/") | not)]')
            if [ "$filtered" != "[]" ]; then
              echo "::notice::Using filtered changesets publishedPackages output"
              echo "packages=$filtered" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # IMPORTANT: Only proceed if we're on main branch
          # The changesets action switches to changeset-release/main to prepare the PR
          current_branch=$(git branch --show-current)
          if [ "$current_branch" != "main" ]; then
            echo "::notice::Not on main branch (on $current_branch), skipping release detection"
            echo "packages=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Only check commits that are actually on main (not the version PR commit)
          echo "::group::Method 2 - Check for new tags on main"
          packages_json="[]"

          for pkg_json in packages/*/package.json packages/*/*/package.json; do
            [ -f "$pkg_json" ] || continue

            name=$(jq -r '.name // empty' "$pkg_json")
            version=$(jq -r '.version // empty' "$pkg_json")

            [ -z "$name" ] || [ -z "$version" ] && continue

            if ! is_publishable "$name"; then
              echo "Skipping internal package: $name"
              continue
            fi

            clean_name=$(echo "$name" | sed 's|^@.*/||')
            tag_name="v${version}"

            echo "Checking $name@$version..."

            if git tag -l "$name@$version" | grep -q .; then
              echo "  ✓ Found local tag: $name@$version"

              dist_repo_url="https://github.com/flixlix/${clean_name}.git"
              if git ls-remote --tags "$dist_repo_url" 2>/dev/null | grep -q "refs/tags/${tag_name}$"; then
                echo "  ⊘ Tag $tag_name already exists on dist repo, skipping"
              else
                echo "  → Tag $tag_name not on dist repo, will release"
                packages_json=$(echo "$packages_json" | jq -c --arg n "$name" --arg v "$version" '. + [{name:$n,version:$v}]')
              fi
            else
              echo "  ⊘ No local tag found"
            fi
          done
          echo "::endgroup::"

          echo "::group::Method 3 - Fallback: Check git diff (main only)"
          if [ "$packages_json" = "[]" ]; then
            echo "No tagged packages found, checking git history on main..."

            # Only check commits between event.before and event.sha (the actual push to main)
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
            
            # Skip if this is a new branch or invalid ref
            if [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
              echo "New branch push, skipping diff check"
            else
              files=$(git diff --name-only "$base_sha" "$head_sha" -- 'packages/**/package.json' 2>/dev/null || true)
              
              if [ -n "$files" ]; then
                echo "Changed package.json files between $base_sha and $head_sha:"
                echo "$files"
                
                while IFS= read -r file; do
                  [ -z "$file" ] && continue
                  [ -f "$file" ] || continue

                  old_version=$(git show "${base_sha}:${file}" 2>/dev/null | jq -r '.version // empty' 2>/dev/null || echo "")
                  new_version=$(jq -r '.version // empty' "$file")
                  name=$(jq -r '.name // empty' "$file")

                  if ! is_publishable "$name"; then
                    continue
                  fi

                  if [ -n "$old_version" ] && [ -n "$new_version" ] && [ "$old_version" != "$new_version" ] && [ -n "$name" ]; then
                    clean_name=$(echo "$name" | sed 's|^@.*/||')
                    tag_name="v${new_version}"

                    if echo "$packages_json" | jq -e --arg n "$name" '.[] | select(.name == $n)' > /dev/null 2>&1; then
                      continue
                    fi

                    dist_repo_url="https://github.com/flixlix/${clean_name}.git"
                    if git ls-remote --tags "$dist_repo_url" 2>/dev/null | grep -q "refs/tags/${tag_name}$"; then
                      echo "  ⊘ $name@$new_version already released"
                    else
                      echo "  → Found: $name ($old_version → $new_version)"
                      packages_json=$(echo "$packages_json" | jq -c --arg n "$name" --arg v "$new_version" '. + [{name:$n,version:$v}]')
                    fi
                  fi
                done <<< "$files"
              fi
            fi
          fi
          echo "::endgroup::"

          echo "::group::Final Result"
          echo "Packages to release:"
          echo "$packages_json" | jq '.'
          echo "packages=$packages_json" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      # ============================================
      # DISTRIBUTION (Sync to Dist Repos)
      # ============================================
      - name: Sync Packages to Distribution Repos
        if: steps.released-packages.outputs.packages != '[]'
        env:
          DIST_REPO_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
          PUBLISHED_PACKAGES: ${{ steps.released-packages.outputs.packages }}
        run: |
          set -euo pipefail

          if [ -z "$PUBLISHED_PACKAGES" ] || [ "$PUBLISHED_PACKAGES" == "[]" ]; then
            echo "::notice::No packages to distribute"
            exit 0
          fi

          echo "::group::Packages to distribute"
          echo "$PUBLISHED_PACKAGES" | jq '.'
          echo "::endgroup::"

          echo "$PUBLISHED_PACKAGES" | jq -c '.[]' | while read -r pkg; do
            NAME=$(echo "$pkg" | jq -r '.name')
            VERSION=$(echo "$pkg" | jq -r '.version')
            CLEAN_NAME=$(echo "$NAME" | sed 's|^@.*/||')

            echo "::group::📦 $NAME@$VERSION"

            # Find package directory
            PKG_DIR=$(find packages -name package.json -exec grep -l "\"name\": \"$NAME\"" {} + 2>/dev/null | head -1 | xargs dirname)
            if [ -z "$PKG_DIR" ] || [ ! -d "$PKG_DIR" ]; then
              echo "::error::Could not find package directory for $NAME"
              echo "::endgroup::"
              continue
            fi
            echo "Package dir: $PKG_DIR"

            # Build
            echo "Building..."
            if ! pnpm --filter "$NAME" build; then
              echo "::error::Build failed for $NAME"
              echo "::endgroup::"
              continue
            fi

            BUILD_OUTPUT="${PKG_DIR}/dist/${CLEAN_NAME}.js"
            if [ ! -f "$BUILD_OUTPUT" ]; then
              echo "::error::Build output not found: $BUILD_OUTPUT"
              echo "::endgroup::"
              continue
            fi

            # Clone dist repo
            echo "Cloning dist repo..."
            rm -rf dist-repo
            DIST_REPO_URL="https://x-access-token:${DIST_REPO_TOKEN}@github.com/flixlix/${CLEAN_NAME}.git"
            if ! git clone "$DIST_REPO_URL" dist-repo 2>/dev/null; then
              echo "::error::Failed to clone flixlix/${CLEAN_NAME}"
              echo "::endgroup::"
              continue
            fi

            # Copy files
            echo "Copying files..."
            cp -f "$BUILD_OUTPUT" "dist-repo/${CLEAN_NAME}.js"
            jq 'del(.dependencies, .devDependencies, .scripts, .packageManager, .main, .exports)' "${PKG_DIR}/package.json" > dist-repo/package.json

            for file in hacs.json README.md CHANGELOG.md LICENSE; do
              [ -f "${PKG_DIR}/${file}" ] && cp -f "${PKG_DIR}/${file}" "dist-repo/${file}"
            done

            # Extract changelog
            NOTES="Release v${VERSION}"
            if [ -f "${PKG_DIR}/CHANGELOG.md" ]; then
              EXTRACTED=$(sed -n "/^## ${VERSION}/,/^## /p" "${PKG_DIR}/CHANGELOG.md" | sed '1d;$d' | sed '/^$/d')
              [ -n "$EXTRACTED" ] && NOTES="$EXTRACTED"
            fi

            # Commit and push
            cd dist-repo
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A

            if ! git diff-index --quiet HEAD 2>/dev/null; then
              git commit -m "Release v${VERSION}"
            fi

            TAG_NAME="v${VERSION}"
            if git ls-remote --tags origin | grep -q "refs/tags/${TAG_NAME}$"; then
              echo "::warning::Tag $TAG_NAME already exists"
              cd ..
              rm -rf dist-repo
              echo "::endgroup::"
              continue
            fi

            git tag -a "$TAG_NAME" -m "Release ${TAG_NAME}"

            if ! git push origin main --tags; then
              echo "::error::Failed to push"
              cd ..
              rm -rf dist-repo
              echo "::endgroup::"
              continue
            fi

            # Create release
            PRERELEASE_FLAG=""
            [[ "$VERSION" == *"-"* ]] && PRERELEASE_FLAG="--prerelease"

            if ! gh release create "$TAG_NAME" "${CLEAN_NAME}.js" \
              --repo "flixlix/${CLEAN_NAME}" \
              --title "$TAG_NAME" \
              --notes "$NOTES" \
              $PRERELEASE_FLAG; then
              echo "::error::Failed to create release"
            fi

            cd ..
            rm -rf dist-repo
            echo "::notice::✅ Released $NAME@$VERSION"
            echo "::endgroup::"
          done

          echo "🎉 Distribution complete!"
